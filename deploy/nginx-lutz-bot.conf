server {
    server_name lutz.bot www.lutz.bot;

    # Built React app — Vite watch mode rebuilds dist/ on every file save,
    # so this is "live" without serving dev artifacts to the browser.
    root /var/www/lutz-bot/dashboard/dist;
    index index.html;

    # Backend REST API.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend WebSocket endpoint. Exact-match (=) so /ws doesn't 301 to
    # /ws/ — WS clients can't follow the http→ws scheme rewrite the
    # redirect implies (they error "scheme isn't ws or wss").
    location = /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # FastAPI docs and OpenAPI schema — useful when developing.
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — any other path serves index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/lutz.bot/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lutz.bot/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.lutz.bot) { return 301 https://$host$request_uri; }
    if ($host = lutz.bot)     { return 301 https://$host$request_uri; }

    listen 80;
    server_name lutz.bot www.lutz.bot;
    return 404;
}
