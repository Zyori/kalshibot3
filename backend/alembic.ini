[alembic]
script_location = %(here)s/alembic

# Use a timestamped slug so migration order is obvious in the directory listing.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .
path_separator = os

# Database URL is injected by alembic/env.py from src.config — leave blank here.
sqlalchemy.url =

[post_write_hooks]
# Format new migration files with ruff. Disabled by default; enable when desired:
# hooks = ruff_format
# ruff_format.type = console_scripts
# ruff_format.entrypoint = ruff
# ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
